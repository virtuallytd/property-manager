services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: propertymanager
      POSTGRES_PASSWORD: ${DB_PASSWORD:-propertymanager}
      POSTGRES_DB: propertymanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propertymanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/virtuallytd/propertymanager-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://propertymanager:${DB_PASSWORD:-propertymanager}@db:5432/propertymanager
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/virtuallytd/propertymanager-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_uploads:
